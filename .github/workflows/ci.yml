name: Timestamp_msi CI

on:
  push:
    branches:
      - main
      - automation
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: timestamp-msi-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install API dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run API tests
        working-directory: apps/api
        run: python -m pytest

      - name: Compile API package
        working-directory: apps/api
        run: python -m compileall app

  web:
    name: Web lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Lint web app
        working-directory: apps/web
        run: npm run lint

      - name: Build web app
        working-directory: apps/web
        run: npm run build
