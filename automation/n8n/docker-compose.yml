services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:stable
    container_name: timestamp-msi-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=Asia/Kolkata
      - TZ=Asia/Kolkata
      - N8N_HOST=127.0.0.1
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
    volumes:
      - timestamp_msi_n8n_data:/home/node/.n8n

volumes:
  timestamp_msi_n8n_data:
